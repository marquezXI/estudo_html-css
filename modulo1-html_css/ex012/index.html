<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>video em html5</title>
</head>
<body>
    <h1>Inserindo videos hospedados localmente</h1>
    <P>eSTE vídeo esta hospedado no meu próprio servidor.</P>
    <video  width='500' height="300" poster="Meuvideo.mp4" controls>
        <source src="Meuvideo.mp4" type="video/mp4">
    </video>

    <h1>Inserindo videos do youtube</h1>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/DfloaXUKr2o?si=VwVqfdu3KMtvllnc" 
    title="YouTube video player" frameborder="0" allow="accelerometer;
    autoplay; clipboard-write; encrypted-media;
    gyroscope; picture-in-picture; web-share" referrerpolicy="
    strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
