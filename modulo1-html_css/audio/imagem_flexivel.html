<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIDIAS EM HTML5</title>
</head>
<body>
    <h1>Imagem dinamica</h1>
    <p>Tente abrir esse site em varios dispositivos diferentes ou simplesmente aumente e diminua o tamnho do seu navegador.</p>
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/imagem_pequena.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/imagem_media.png" type="image/png">
        <img src="imagens/imagem_grande.png" alt="">
    </picture>
    <h1>Reproduzindo audio</h1>
    <audio src="happy_mistake.mp3"  controls autoplay></audio>
    <audio preload="metadata" autoplay controls loop>
        <source src="guanacast-33.mp3" type="audio/mpeg">
        <source src="guanacast-33.mp3" type="audio/ogg">
        <source src="guanacast-33.mp3" type="audio/wav">
        <p>infelizmente seu navegador não consegue carregar o arquivo de audio</p>
    </audio>

 
</body>
</html>
